# ============================================================
# AI Resume Analyzer — Application Configuration
# ============================================================

# Server
server.port=8080

# ── Groq AI Configuration ───────────────────────────────────
# Read from environment variable GROQ_API_KEY
# Set fallback value for local development only
groq.api.key=${GROQ_API_KEY:}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.api.model=llama-3.3-70b-versatile
groq.max.tokens=4096
groq.temperature=0.3

# ── File Upload ───────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# ── H2 In-Memory Database ─────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:resumedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Management / Actuator ─────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoints.web.base-path=/actuator

# ── Logging ───────────────────────────────────────────────────
logging.level.com.resumeanalyzer=INFO
logging.level.org.springframework.web=WARN
